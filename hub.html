<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YA Toolkit</title>

  <!-- PWA / home screen -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="YA Toolkit" />
  <link rel="apple-touch-icon" href="/ya.svg" />

  <!-- Open Graph -->
  <meta property="og:title"       content="YA Toolkit" />
  <meta property="og:description" content="Your YA leader toolkit." />
  <meta property="og:type"        content="website" />
  <link rel="icon" href="/ya.svg" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f8f9fb;
      --surface:       #ffffff;
      --border:        #e2e6ea;
      --text:          #1a1d23;
      --muted:         #6b7280;
      --primary:       #4f46e5;
      --primary-light: #eef2ff;
      --shadow:        0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
      --shadow-lg:     0 8px 32px rgba(0,0,0,.12);
      --radius:        10px;
    }

    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
    }

    /* ── Layout ───────────────────────────────────────────────── */
    .page {
      max-width: 480px; margin: 0 auto;
      padding: 52px 20px 100px; /* bottom padding for the prompt */
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ── Hero ─────────────────────────────────────────────────── */
    .hero {
      display: flex; flex-direction: column; align-items: center;
      gap: 18px; margin-bottom: 44px; text-align: center;
    }
    .hero-logo {
      width: 80px; height: 80px; border-radius: 20px;
      background: #0a0a0a; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-lg);
    }
    .hero-logo img { width: 72%; height: 72%; object-fit: contain; display: block; }
    .hero-title    { font-size: 32px; font-weight: 800; letter-spacing: -.6px; }
    .hero-subtitle { font-size: 15px; color: var(--muted); }

    /* ── Section ──────────────────────────────────────────────── */
    .section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted); margin-bottom: 10px;
    }
    .section + .section { margin-top: 28px; }

    /* ── Cards ────────────────────────────────────────────────── */
    .cards { display: flex; flex-direction: column; gap: 10px; }
    .card {
      background: var(--surface); border-radius: 14px;
      border: 1.5px solid var(--border);
      padding: 16px 18px; display: flex; align-items: center; gap: 16px;
      text-decoration: none; color: var(--text);
      transition: border-color .15s, box-shadow .15s, transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .card:hover, .card:active {
      border-color: var(--primary);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }
    .card-icon {
      width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .card-icon svg { display: block; width: 26px; height: 26px; }
    .card-icon-discord svg { width: 100%; height: 100%; }
    .card-body { flex: 1; min-width: 0; }
    .card-name { font-size: 16px; font-weight: 700; }
    .card-desc { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .card-arrow { font-size: 20px; color: var(--border); flex-shrink: 0; transition: color .15s; }
    .card:hover .card-arrow, .card:active .card-arrow { color: var(--primary); }

    /* ── Add-to-home-screen prompt ────────────────────────────── */
    .home-prompt {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 14px 20px 20px; /* extra bottom for home indicator */
      display: flex; align-items: flex-start; gap: 12px;
      box-shadow: 0 -4px 24px rgba(0,0,0,.08);
    }
    .home-prompt.hidden { display: none; }
    .prompt-icon {
      width: 36px; height: 36px; border-radius: 8px; background: #0a0a0a;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .prompt-icon img { width: 72%; height: 72%; object-fit: contain; display: block; }
    .prompt-body { flex: 1; min-width: 0; }
    .prompt-title { font-size: 14px; font-weight: 700; }
    .prompt-sub   { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
    .prompt-sub .share-icon {
      display: inline-block; width: 14px; height: 14px;
      vertical-align: -2px; margin: 0 1px;
    }
    .prompt-dismiss {
      background: none; border: none; color: var(--muted);
      font-size: 18px; cursor: pointer; padding: 0; flex-shrink: 0;
      line-height: 1; margin-top: 1px;
    }
    .prompt-dismiss:hover { color: var(--text); }

    /* Only show prompt on mobile */
    @media (min-width: 700px) { .home-prompt { display: none !important; } }

    /* Safe area on iPhone */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .home-prompt { padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
      .page { padding-top: max(52px, env(safe-area-inset-top)); }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-logo">
      <img src="/ya.svg" alt="YA" />
    </div>
    <div>
      <div class="hero-title">YA Toolkit</div>
      <div class="hero-subtitle">Your leader toolkit</div>
    </div>
  </div>

  <!-- Tools -->
  <div class="section">
    <div class="section-label">Tools</div>
    <div class="cards">

      <a class="card" href="/people">
        <div class="card-icon" style="background:#374151">
          <!-- Person icon -->
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="3.5" fill="white"/>
            <path d="M4.5 20c0-4 3.358-7 7.5-7s7.5 3 7.5 7"
              stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="card-body">
          <div class="card-name">YA People</div>
          <div class="card-desc">Crew directory, follow-ups &amp; notes</div>
        </div>
        <div class="card-arrow">›</div>
      </a>

      <a class="card" href="/calendar">
        <div class="card-icon" style="background:#374151">
          <!-- Calendar icon -->
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="3" y="5" width="18" height="16" rx="2.5" stroke="white" stroke-width="1.7"/>
            <path d="M3 10h18" stroke="white" stroke-width="1.7"/>
            <path d="M8 3v4M16 3v4" stroke="white" stroke-width="1.7" stroke-linecap="round"/>
            <circle cx="8"  cy="15" r="1.1" fill="white"/>
            <circle cx="12" cy="15" r="1.1" fill="white"/>
            <circle cx="16" cy="15" r="1.1" fill="white"/>
          </svg>
        </div>
        <div class="card-body">
          <div class="card-name">YA Calendar</div>
          <div class="card-desc">Events, services &amp; schedule</div>
        </div>
        <div class="card-arrow">›</div>
      </a>

    </div>
  </div>

  <!-- Community -->
  <div class="section">
    <div class="section-label">Community</div>
    <div class="cards">

      <a class="card" href="https://discord.com/channels/1503595068722778154">
        <div class="card-icon card-icon-discord" style="background:#5865F2;padding:10px">
          <!-- Discord icon -->
          <svg viewBox="0 -15.39 127.14 127.14" fill="white">
            <path fill-rule="evenodd" d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
          </svg>
        </div>
        <div class="card-body">
          <div class="card-name">Discord</div>
          <div class="card-desc">YA Leaders server — home base</div>
        </div>
        <div class="card-arrow">›</div>
      </a>

    </div>
  </div>

</div><!-- /page -->

<!-- Add to home screen prompt (mobile only) -->
<div class="home-prompt hidden" id="homePrompt">
  <div class="prompt-icon"><img src="/ya.svg" alt="YA" /></div>
  <div class="prompt-body">
    <div class="prompt-title">Add YA Hub to your home screen</div>
    <div class="prompt-sub" id="promptSub">
      Tap the share button
      <svg class="share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 3v13M8 7l4-4 4 4"/><path d="M20 16v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-3"/>
      </svg>
      then <strong>"Add to Home Screen"</strong> for one-tap access — no Discord browser.
    </div>
  </div>
  <button class="prompt-dismiss" id="promptDismiss" aria-label="Dismiss">✕</button>
</div>

<script>
  // Show the add-to-home-screen prompt on mobile Safari (iOS) or Android Chrome,
  // unless already running as a standalone app or previously dismissed.
  (function () {
    const DISMISSED_KEY = 'ya_hub_prompt_dismissed'
    if (localStorage.getItem(DISMISSED_KEY)) return
    if (window.navigator.standalone) return          // already installed on iOS
    if (window.matchMedia('(display-mode: standalone)').matches) return // Android PWA

    const isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent)
    const isAndroid = /android/i.test(navigator.userAgent)
    if (!isIOS && !isAndroid) return

    const prompt  = document.getElementById('homePrompt')
    const sub     = document.getElementById('promptSub')
    const dismiss = document.getElementById('promptDismiss')

    if (isAndroid) {
      // Android: update copy (Chrome uses ⋮ menu → "Add to Home Screen")
      sub.innerHTML = 'Tap the <strong>⋮ menu</strong> then <strong>"Add to Home Screen"</strong> for one-tap access — no Discord browser.'
    }

    // Show after a short delay so it doesn't pop on first paint
    setTimeout(() => prompt.classList.remove('hidden'), 1200)

    dismiss.addEventListener('click', () => {
      prompt.classList.add('hidden')
      localStorage.setItem(DISMISSED_KEY, '1')
    })
  })()
</script>

</body>
</html>
